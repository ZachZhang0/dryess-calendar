name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 3 */6 * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      
      - name: Keep Supabase Project Alive
        env:
          SUPABASE_URL: https://ehsfmciathifanermnoc.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "=== Starting Supabase Keep-Alive ==="
          
          # 使用 curl 调用 Supabase API
          RESPONSE=$(curl -s -X GET "$SUPABASE_URL/rest/v1/calendar_data?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          
          if [ $? -eq 0 ]; then
            echo "✅ API call executed successfully!"
            echo "Response: $RESPONSE"
            echo "✅ Supabase project keep-alive completed!"
          else
            echo "❌ API call failed!"
            exit 1
          fi
