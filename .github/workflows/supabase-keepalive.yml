# Supabase 保活 GitHub Action
# 每 6 天自动执行一次数据库查询，防止项目被暂停

name: Supabase Keep-Alive

on:
  # 每 6 天执行一次（避开 7 天限制）
  schedule:
    - cron: '0 3 */6 * *'  # UTC 时间 3:00，每 6 天
  
  # 允许手动触发
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      
      - name: Keep Supabase Project Alive
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_URL: https://ehsfmciathifanermnoc.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "=== Starting Supabase Keep-Alive ==="
          echo "Executing database query..."
          
          # 检查环境变量
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "❌ Error: SUPABASE_DB_URL is not set!"
            exit 1
          fi
          
          echo "✓ Database URL is set"
          
          # 使用 curl 调用 Supabase API（IPv4 友好）
          RESPONSE=$(curl -s -X GET "$SUPABASE_URL/rest/v1/calendar_data?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json")
          
          if [ $? -eq 0 ]; then
            echo "✅ API call executed successfully!"
            echo "Response: $RESPONSE"
            echo "✅ Supabase project keep-alive completed!"
            echo "✅ Next run will be in 6 days."
          else
            echo "❌ API call failed!"
            exit 1
          fi
          
          echo "=== Keep-Alive Completed ==="
