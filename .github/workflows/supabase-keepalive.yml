# Supabase 保活 GitHub Action
# 每 6 天自动执行一次数据库查询，防止项目被暂停

name: Supabase Keep-Alive

on:
  # 每 6 天执行一次（避开 7 天限制）
  schedule:
    - cron: '0 3 */6 * *'  # UTC 时间 3:00，每 6 天
  
  # 允许手动触发
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      
      - name: Keep Supabase Project Alive
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "=== Starting Supabase Keep-Alive ==="
          echo "Executing database query..."
          
          # 检查环境变量
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "❌ Error: SUPABASE_DB_URL is not set!"
            echo "❌ Please add the secret in GitHub Settings > Secrets and variables > Actions"
            exit 1
          fi
          
          echo "✓ Database URL is set"
          echo "Database: $(echo $SUPABASE_DB_URL | sed 's/postgres:\/\/postgres:[^@]*@/postgres:\/\/***@/')"
          
          # 使用 psql 执行简单的查询（通过 hosts 文件强制 IPv4）
          PGPASSWORD=$(echo $SUPABASE_DB_URL | sed -n 's/.*:\/\/postgres:\([^@]*\)@.*/\1/p')
          DB_HOST=$(echo $SUPABASE_DB_URL | sed -n 's/.*@\([^:]*\):.*/\1/p')
          
          # 获取 IPv4 地址
          IPV4_ADDR=$(getent ahostsv4 "$DB_HOST" | head -n1 | awk '{print $1}')
          echo "Resolved IPv4: $IPV4_ADDR"
          
          # 临时修改 hosts 文件
          echo "$IPV4_ADDR $DB_HOST" | sudo tee -a /etc/hosts
          
          # 使用 psql 连接
          echo "SELECT NOW() as current_time, version() as postgres_version;" | \
            PGPASSWORD="$PGPASSWORD" psql -h "$DB_HOST" -U postgres -d postgres
          
          if [ $? -eq 0 ]; then
            echo "✅ Database query executed successfully!"
            echo "✅ Supabase project keep-alive completed!"
            echo "✅ Next run will be in 6 days."
          else
            echo "❌ Database query failed!"
            echo "❌ Please check the database connection and credentials."
            exit 1
          fi
          
          echo "=== Keep-Alive Completed ==="
